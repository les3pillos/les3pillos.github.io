<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les 3 Pillos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <!-- Columna Izquierda: Logo y Textos -->
        <div class="left-column">
            <header class="hero">
                <h2 class="slogan">¡DIOS TE AMA!</h2>
                <div class="logo-container">
                    <div class="logo-glow"></div>
                    <img src="logo.png" alt="Les 3 Pillos Logo" class="profile-pic">
                </div>
                <h1 class="title">LES 3 PILLOS</h1>
                <p class="subtitle">Bienvenidos a la página oficial. Únete a nuestra comunidad.</p>
            </header>
        </div>

        <!-- Columna Central: Póster de GTA 6 -->
        <div class="center-column">
            <img src="bg.jpg" alt="GTA 6 Les 3 Pillos Poster">
        </div>

        <!-- Columna Derecha: Botones -->
        <div class="right-column">
            <main class="links-grid">
                <a href="https://www.patreon.com/c/Les3Pillos" class="card premium-card" target="_blank">
                    <div class="card-icon"><i class="fab fa-patreon"></i></div>
                    <div class="card-content">
                        <h3>Pase VIP Express</h3>
                        <p>Sáltate la fila y juega sin esperar</p>
                    </div>
                    <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
                </a>
                
                <a href="https://discord.gg/P7J5WGpX9G" class="card discord-card" target="_blank">
                    <div class="card-icon"><i class="fab fa-discord"></i></div>
                    <div class="card-content">
                        <h3>Discord 🟢 Online 24/7</h3>
                        <p>Únete a nuestros +500 miembros activos</p>
                    </div>
                    <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
                </a>

                <div class="social-row">
                    <a href="https://www.tiktok.com/@les3pillos" class="social-btn tiktok-btn" target="_blank">
                        <i class="fab fa-tiktok"></i> @les3pillos
                    </a>
                    <a href="https://www.tiktok.com/@surisita8" class="social-btn tiktok-btn" target="_blank">
                        <i class="fab fa-tiktok"></i> @surisita8
                    </a>
                </div>
            </main>
            
            <footer>
                <p>Les 3 Pillos Family &copy; 2026. Todos los derechos reservados.</p>
            </footer>
        </div>
    </div>
</body>
</html>
